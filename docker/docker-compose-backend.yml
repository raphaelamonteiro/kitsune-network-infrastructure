version: '3'

services:
  backend-1:
    image: php:8.2-apache
    container_name: backend-1
    ports:
      - "9000:80" # mapeia porta 80 do container p/ porta 9000 do host
    volumes:
      - ./backend:/var/www/html # monta a pasta backend
    env_file:
      - ./backend/.env
    environment: # injetando as configs do banco como variáveis de ambiente, com fallback para o padrão"
      - DB_HOST=${DB_HOST:-database}
      - DB_NAME=${DB_NAME:-kitsune}
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-123456}

# instâncias idênticas do backend para o balanceamento de carga
  backend-2:
    image: php:8.2-apache
    container_name: backend-2
    ports:
      - "9001:80"
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=${DB_HOST:-database}
      - DB_NAME=${DB_NAME:-kitsune}
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-123456}

  backend-3:
    image: php:8.2-apache
    container_name: backend-3
    ports:
      - "9002:80"
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=${DB_HOST:-database}
      - DB_NAME=${DB_NAME:-kitsune}
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-123456}

  database:
    image: postgres:15-alpine
    container_name: database
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-kitsune}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - ./backend/.env

volumes:
  postgres-data: